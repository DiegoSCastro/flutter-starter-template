version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  flutter_secure_storage: ^10.3.1
  injectable: ^3.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  injectable_generator: ^3.0.2
  test_utils: ^0.1.0
