name: flutter_starter_template
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # iOS-style icon set, used via the CupertinoIcons class.
  cupertino_icons: ^1.0.8

  # State management: BLoC/Cubit pattern (BlocProvider, BlocBuilder, BlocListener).
  flutter_bloc: ^9.1.1

  # Declarative routing with deep-linking and auth-redirect support.
  # Pairs with go_router_builder for typed routes.
  go_router: ^17.2.3

  # Material/Cupertino/Widgets localization delegates required by the
  # i18n pipeline (generate: true + ARB files under lib/l10n/).
  flutter_localizations:
    sdk: flutter

  # Locale-aware formatting (dates, numbers, plurals) and runtime backing
  # for the generated AppLocalizations class.
  intl: any

  # DI annotations (@injectable, @singleton, @module) — drives registration
  # codegen on top of get_it via injectable_generator.
  injectable: ^3.0.0

  # Service-locator container that holds the DI graph injectable generates.
  get_it: ^9.2.1

  # Type-safe HTTP client: annotate an abstract class, codegen produces a
  # Dio-backed implementation (used by the auth remote data source).
  retrofit: ^4.9.2

  # Underlying HTTP transport for retrofit; interceptors, timeouts, and
  # error mapping live here.
  dio: ^5.9.2

  # Runtime annotations (@JsonSerializable, @JsonKey) consumed by
  # json_serializable to generate fromJson/toJson.
  json_annotation: ^4.12.0

  # Runtime annotations (@freezed) consumed by freezed to generate
  # immutable data classes and sealed unions (used by auth models).
  freezed_annotation: ^3.1.0

  # Encrypted persistent storage for the auth session (access + refresh
  # tokens). Keychain on iOS, EncryptedSharedPreferences/Keystore on Android.
  flutter_secure_storage: ^10.3.0

  # Launches URLs in the system browser (used by the bookmarks feature's
  # "Open" action).
  url_launcher: ^6.3.2

  # Embedded NoSQL object database. Backs the local-only bookmarks store —
  # entities are annotated with @Entity() and queried via the generated
  # objectbox.g.dart bindings.
  objectbox: ^5.3.2

  # Native ObjectBox runtime libraries bundled into the iOS/Android app.
  # On first build, an install script downloads the per-platform binaries.
  objectbox_flutter_libs: ^5.3.2

  # Provides the platform-appropriate application documents directory used
  # by ObjectBox to locate its store file on device.
  path_provider: ^2.1.5

  # Client-side UUID generation for offline-first creates: the app mints a
  # stable id locally and the server accepts it on POST /api/bookmarks.
  uuid: ^4.5.3

  # Reactive online/offline detection. The sync service subscribes and
  # drains pending mutations when connectivity is restored.
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint set, activated via analysis_options.yaml.
  flutter_lints: ^6.0.0

  # Codegen for typed route classes (TypedGoRoute) — strongly-typed navigation.
  go_router_builder: ^4.3.0

  # Codegen driver. Runs every generator below.
  # Run: dart run build_runner build --delete-conflicting-outputs
  build_runner: ^2.15.0

  # CI guard: fails the build if generated files are stale
  # (i.e. someone forgot to re-run build_runner).
  build_verify: ^3.1.1

  # Generates configureDependencies() registration code for get_it
  # from @injectable annotations.
  injectable_generator: ^3.0.2

  # Generates the concrete API client implementation from
  # retrofit-annotated abstract classes.
  retrofit_generator: ^10.2.6

  # Generates fromJson/toJson from @JsonSerializable annotations.
  json_serializable: ^6.14.0

  # Generates immutable classes, copyWith, equality, and union/sealed
  # variants from @freezed annotations.
  freezed: ^3.2.5

  # Generates the ObjectBox binding (lib/objectbox.g.dart) and schema
  # (lib/objectbox-model.json) from @Entity-annotated classes.
  objectbox_generator: ^5.3.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Enables generation of localized strings from ARB files via `gen-l10n`.
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
