name: flutter_starter_template
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.0

workspace:
  - packages/app_ui
  - packages/core_analytics
  - packages/core_config
  - packages/core_domain
  - packages/core_network
  - packages/core_platform
  - packages/core_theme

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  app_ui: ^0.1.0
  core_analytics: ^0.1.0
  core_config: ^0.1.0
  core_domain: ^0.1.0
  core_network: ^0.1.0
  core_platform: ^0.1.0
  core_theme: ^0.1.0

  flutter:
    sdk: flutter

  # iOS-style icon set, used via the CupertinoIcons class.
  cupertino_icons: ^1.0.8

  # State management: BLoC pattern (BlocProvider, BlocBuilder, BlocListener).
  flutter_bloc: ^9.1.1
  # Event transformers for Bloc handlers.
  bloc_concurrency: ^0.3.0

  # Declarative routing with deep-linking and auth-redirect support.
  # Pairs with go_router_builder for typed routes.
  go_router: ^17.2.3

  # Material/Cupertino/Widgets localization delegates required by the
  # i18n pipeline (generate: true + ARB files under lib/l10n/).
  flutter_localizations:
    sdk: flutter

  # Locale-aware formatting (dates, numbers, plurals) and runtime backing
  # for the generated AppLocalizations class. Pinned to the version the pinned
  # Flutter SDK's flutter_localizations resolves to, for reproducible builds.
  intl: ^0.20.2

  # DI annotations (@injectable, @singleton, @module) — drives registration
  # codegen on top of get_it via injectable_generator.
  injectable: ^3.0.0

  # Service-locator container that holds the DI graph injectable generates.
  get_it: ^9.2.1

  # Type-safe HTTP client: annotate an abstract class, codegen produces a
  # Dio-backed implementation (used by the auth remote data source).
  retrofit: ^4.9.2

  # Underlying HTTP transport for retrofit; interceptors, timeouts, and
  # error mapping live here.
  dio: ^5.9.2

  # Runtime annotations (@JsonSerializable, @JsonKey) consumed by
  # json_serializable to generate fromJson/toJson.
  json_annotation: ^4.12.0

  # Runtime annotations (@freezed) consumed by freezed to generate
  # immutable data classes and sealed unions (used by auth models).
  freezed_annotation: ^3.1.0

  # Encrypted persistent storage for the auth session (access + refresh
  # tokens). Keychain on iOS, EncryptedSharedPreferences/Keystore on Android.
  flutter_secure_storage: ^10.3.1

  # Launches URLs in the system browser (used by the bookmarks feature's
  # "Open" action).
  url_launcher: ^6.3.2

  # Embedded NoSQL object database. Backs the local-only bookmarks store —
  # entities are annotated with @Entity() and queried via the generated
  # objectbox.g.dart bindings.
  objectbox: ^5.3.2

  # Native ObjectBox runtime libraries bundled into the iOS/Android app.
  # On first build, an install script downloads the per-platform binaries.
  objectbox_flutter_libs: ^5.3.2

  # Provides the platform-appropriate application documents directory used
  # by ObjectBox to locate its store file on device.
  path_provider: ^2.1.5

  # Client-side UUID generation for offline-first creates: the app mints a
  # stable id locally and the server accepts it on POST /api/bookmarks.
  uuid: ^4.5.3

  # Interactive carousel / image slider widget with auto-play and
  # customisable transitions.
  carousel_slider: ^5.1.2

  # Reactive online/offline detection. The sync service subscribes and
  # drains pending mutations when connectivity is restored.
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  package_info_plus: ^10.1.0

  # SVG rendering. Pairs with flutter_gen_runner: SVGs placed in assets/icons/
  # get typed accessors that expose a ready-to-use SvgPicture widget.
  flutter_svg: ^2.3.0

  # Cross-platform local (on-device) notifications. Used to schedule and
  # display notifications without a push backend; permissions are requested
  # at runtime on iOS and on Android 13+.
  flutter_local_notifications: ^21.0.0

  # Firebase platform initialization — required by every Firebase plugin.
  firebase_core: ^4.9.0

  # Firebase Crashlytics — real-time crash reporting for both Dart and
  # native (Android/iOS) stack traces.
  firebase_crashlytics: ^5.2.2
  firebase_analytics: ^12.4.1
  firebase_messaging: ^16.2.2

  # Automatic network + screen-rendering traces. The PerformanceInterceptor
  # records an HttpMetric per request; collection is disabled in dev builds.
  firebase_performance: ^0.11.4+1

  # Server-controlled feature flags and config values. Wrapped by
  # RemoteConfigService with compile-time defaults so reads never block on a
  # network fetch.
  firebase_remote_config: ^6.5.1

  # Dynamic M3 colour schemes built on top of Material Color Utilities. 
  # Provides FlexColorScheme, FlexSubThemes, and opinionated defaults.
  flex_color_scheme: ^8.4.0

  # Declarative animation helpers (fade, slide, scale, shake, etc.)
  # exposed as extensions on Widget.
  flutter_animate: ^4.5.2

  # Pre-built animated text widgets (typewriter, fade, scale, colorize, etc.)
  animated_text_kit: ^4.3.0
  share_plus: ^13.1.0
  flutter_link_previewer: ^4.2.0

  # Swipe actions for list rows, wrapped by AppSlidable.
  flutter_slidable: ^4.0.3

  # Cross-platform runtime permission API. Wrapped by PermissionService.
  permission_handler: ^12.0.1

  # Interactive zoomable image viewer widget. Wrapped by AppPhotoView.
  photo_view: ^0.15.0

  vector_graphics: ^1.2.2
  image_picker: ^1.2.2
  camera: ^0.12.0+1
  video_player: ^2.11.1
  cached_network_image: ^3.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  # End-to-end testing harness. Drives the assembled app (via the testable
  # App(...) seams) through full user flows; runs on a device or headless.
  integration_test:
    sdk: flutter

  # Mocking library for tests — uses real callable objects without codegen.
  mocktail: ^1.0.5

  # High-level testing utilities for Bloc: blocTest helper, wait
  # for states, and verify exact emission sequences.
  bloc_test: ^10.0.0

  # Recommended lint set, activated via analysis_options.yaml.
  flutter_lints: ^6.0.0

  # Codegen for typed route classes (TypedGoRoute) — strongly-typed navigation.
  go_router_builder: ^4.3.0

  # Codegen driver. Runs every generator below.
  # Run: dart run build_runner build --delete-conflicting-outputs
  build_runner: ^2.15.0

  # CI guard: fails the build if generated files are stale
  # (i.e. someone forgot to re-run build_runner).
  build_verify: ^3.1.1

  # Generates configureDependencies() registration code for get_it
  # from @injectable annotations.
  injectable_generator: ^3.0.2

  # Generates the concrete API client implementation from
  # retrofit-annotated abstract classes.
  retrofit_generator: ^10.2.6

  # Generates fromJson/toJson from @JsonSerializable annotations.
  json_serializable: ^6.14.0

  # Generates immutable classes, copyWith, equality, and union/sealed
  # variants from @freezed annotations.
  freezed: ^3.2.5

  # Generates the ObjectBox binding (lib/objectbox.g.dart) and schema
  # (lib/objectbox-model.json) from @Entity-annotated classes.
  objectbox_generator: ^5.3.2

  # Generates type-safe references to assets and fonts declared below
  # (output: lib/gen/assets.gen.dart). Use e.g. Assets.images.logo instead
  # of raw 'assets/images/logo.png' strings.
  flutter_gen_runner: ^5.14.1
  very_good_analysis: ^10.2.0

  # Generates native launcher icons for all platforms from a single source
  # image. Run: dart run flutter_launcher_icons (config below).
  flutter_launcher_icons: ^0.14.3

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
  assets:
    enabled: true
    outputs:
      package_parameter_enabled: false
      style: dot-delimiter
  fonts:
    enabled: true

# Native launcher icons. Source images live in tool/launcher_icons/ (build-time
# only, so they are not bundled into the app). Regenerate after editing them:
#   dart run flutter_launcher_icons
# `image_path` is a full-bleed square (iOS/Android/web mask their own corners);
# Android adaptive icons use a solid brand background plus a padded foreground.
flutter_launcher_icons:
  image_path: "tool/launcher_icons/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#095D9E"
  adaptive_icon_foreground: "tool/launcher_icons/app_icon_foreground.png"
  web:
    generate: true
    background_color: "#095D9E"
    theme_color: "#095D9E"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Enables generation of localized strings from ARB files via `gen-l10n`.
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
