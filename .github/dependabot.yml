version: 2
updates:
  # Dart / Flutter packages
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dart
    groups:
      # Bundle all non-major pub bumps into a single PR.
      pub-minor-and-patch:
        update-types:
          - minor
          - patch

  # Android Gradle dependencies
  - package-ecosystem: gradle
    directory: "/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - android
    groups:
      gradle-minor-and-patch:
        update-types:
          - minor
          - patch

  # Note: iOS CocoaPods is intentionally omitted — Dependabot has no
  # CocoaPods support, and there is no Gemfile in /ios to track.

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    groups:
      # All action bumps in one PR — they rarely conflict.
      github-actions:
        patterns:
          - "*"
