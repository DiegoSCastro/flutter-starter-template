name: CI

on:
  push:
    branches: [main]
    # Skip analyze/test when a push touches only docs. Any change outside
    # these paths (lib/, test/, packages/, pubspec.*, etc.) still triggers CI.
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
      - 'LICENSE'
      - '.mcp.json'
      - '.agents/**'
      - '.vscode/**'
      - '.antigravity/**'
      - '.antigravitycli/**'
      - '.mcp/**'
      - '.codegraph/**'
      - '.github/workflows/**'
      - 'skills-lock.json'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
      - 'LICENSE'
      - '.mcp.json'
      - '.agents/**'
      - '.vscode/**'
      - '.antigravity/**'
      - '.antigravitycli/**'
      - '.mcp/**'
      - '.codegraph/**'
      - '.github/workflows/**'
      - 'skills-lock.json'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin to the same Flutter SDK as .fvmrc (3.44.0). Bump both together.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # NOTE: we deliberately do NOT cache .dart_tool/build here. Generated
      # files are git-ignored, so the checkout has none; a restored build cache
      # makes build_runner believe outputs already exist and skip regenerating
      # them (observed with flutter_gen's assets.gen.dart), yielding a broken
      # tree. A fresh full build from an empty cache is correct, if slower.

      # Generate code so analyze/test see it. Most generated files
      # (*.g.dart, *.freezed.dart, *.config.dart, *.gen.dart) are git-ignored
      # and produced fresh here. ObjectBox's binding (lib/objectbox.g.dart) and
      # model (lib/objectbox-model.json) ARE tracked — they hold stable schema
      # UIDs — so the diff guard fails the build if those drift, i.e. someone
      # changed an @Entity without committing the regenerated binding.
      - name: Generate code & verify ObjectBox binding is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          if ! git diff --quiet --exit-code -- lib/objectbox.g.dart lib/objectbox-model.json; then
            echo "::error::ObjectBox generated files are out of date. Run 'dart run build_runner build --delete-conflicting-outputs' and commit lib/objectbox.g.dart + lib/objectbox-model.json."
            git diff --stat -- lib/objectbox.g.dart lib/objectbox-model.json
            exit 1
          fi

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      # Golden tests are excluded: Flutter goldens are not guaranteed to match
      # across operating systems, and baselines are generated on macOS while
      # this runner is Ubuntu. They run locally as a regression check (see
      # dart_test.yaml). Integration tests under integration_test/ also do not
      # run here — they boot the real assembled App against an actual platform
      # target (no headless flutter_tester support), which this runner doesn't
      # have set up. Run them locally before release: see
      # integration_test/README.md.
      - name: Run tests
        run: |
          flutter test --coverage --exclude-tags golden

          # Root tests can import workspace packages, but package-owned tests
          # now live under packages/*/test. Keep package source coverage owned
          # by each package test run so package files are not double-counted.
          root_lcov="$(mktemp)"
          awk '
            BEGIN { include = 1 }
            /^SF:/ { include = ($0 !~ /^SF:packages\//) }
            include { print }
          ' coverage/lcov.info > "$root_lcov"
          mv "$root_lcov" coverage/lcov.info

          for package in packages/*; do
            if [ ! -d "$package/test" ]; then
              continue
            fi

            (
              cd "$package"
              flutter test --coverage --exclude-tags golden
            )

            if [ -f "$package/coverage/lcov.info" ]; then
              sed "s|^SF:|SF:$package/|" \
                "$package/coverage/lcov.info" >> coverage/lcov.info
            fi
          done

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

      # Fail the build if line coverage drops below the threshold. Generated
      # files are excluded so the percentage reflects hand-written code only.
      # Current workspace baseline is ~54%; raise `min_coverage` as coverage improves.
      - name: Enforce coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 53
          exclude: >-
            **/*.g.dart
            **/*.freezed.dart
            **/*.config.dart
            **/*.gen.dart
            **/firebase_options.dart
            lib/l10n/**
