name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin to the same Flutter SDK as .fvmrc (3.44.0). Bump both together.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # The real lib/firebase_options.dart is git-ignored, so it is absent in
      # CI. Write a compile-only stub (after the format check, so it is not
      # subject to it) to let analyze and tests resolve DefaultFirebaseOptions.
      - name: Stub firebase_options.dart
        run: |
          cat > lib/firebase_options.dart <<'EOF'
          // CI-only placeholder. The real file is generated by the FlutterFire
          // CLI and is git-ignored; see .gitignore.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
                  apiKey: 'ci-placeholder',
                  appId: 'ci-placeholder',
                  messagingSenderId: 'ci-placeholder',
                  projectId: 'ci-placeholder',
                );
          }
          EOF

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore
