name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pin to the same Flutter SDK as .fvmrc (3.44.0). Bump both together.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # The real lib/firebase_options.dart is git-ignored, so it is absent in
      # CI. Write a compile-only stub (after the format check, so it is not
      # subject to it) to let analyze and tests resolve DefaultFirebaseOptions.
      - name: Stub firebase_options.dart
        run: |
          cat > lib/firebase_options.dart <<'EOF'
          // CI-only placeholder. The real file is generated by the FlutterFire
          // CLI and is git-ignored; see .gitignore.
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
                  apiKey: 'ci-placeholder',
                  appId: 'ci-placeholder',
                  messagingSenderId: 'ci-placeholder',
                  projectId: 'ci-placeholder',
                );
          }
          EOF

      - name: Analyze
        run: flutter analyze

      # Golden tests are excluded: Flutter goldens are not guaranteed to match
      # across operating systems, and baselines are generated on macOS while
      # this runner is Ubuntu. They run locally as a regression check (see
      # dart_test.yaml). Integration tests under integration_test/ also do not
      # run here — `flutter test` only picks up the test/ directory, and they
      # require a connected device/emulator.
      - name: Run tests
        run: flutter test --coverage --exclude-tags golden

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

      # Fail the build if line coverage drops below the threshold. Generated
      # files are excluded so the percentage reflects hand-written code only.
      # Current baseline is ~57%; raise `min_coverage` as coverage improves.
      - name: Enforce coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 55
          exclude: >-
            **/*.g.dart
            **/*.freezed.dart
            **/*.config.dart
            **/*.gen.dart
            **/firebase_options.dart
            lib/l10n/**
